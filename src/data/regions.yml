          zóně.
      - question: Mám spoluvlastnický podíl na domě ve Svitavách — můžete vykoupit jen můj podíl?
        answer: Ano, vykup spoluvlastnických podílů je naše běžná praxe. Podíl oceňujeme obvykle s diskontem oproti poměrné tržní ceně, protože jeho prodej na volném trhu je komplikovaný.
      - question: Jak je na tom trh v Ústí nad Orlicí?
        answer: Ústí nad Orlicí je cenově dostupné město s cenami 22 000–30 000 Kč/m². Trh je stabilní, ale méně likvidní — standardní prodej může trvat 3–5 měsíců. Výkup je proto výhodná alternativa.
