      - question: Vykupujete vinné sklepy na jižní Moravě?
        answer: Ano, vinné sklepy a vinařské usedlosti jsou specifický segment, který v Jihomoravském kraji řešíme pravidelně. Cena závisí na lokalitě (Pálava vs. Podluží), stavu a přilehlých vinicích.
      - question: Mám zděděný byt v centru Brna s nájemníkem — vykoupíte ho?
        answer: Rozhodně. Byty s nájemníky v Brně vykupujeme často. Nájemník zůstává v bytě, vy dostanete peníze. Cena je mírně nižší oproti volnému bytu, ale stále velmi atraktivní vzhledem k brněnským cenám.
