        answer: Ano, lázeňské apartmány jsou jedním z našich hlavních segmentů v kraji. Oceňujeme je na základě aktuální tržní situace, nikoli historických cen z doby ruského boomu.
      - question: Mám byt v exekuci v Sokolově — můžete pomoci?
        answer: Ano, výkup nemovitostí v exekuci je naše specialita. Spolupracujeme s exekutorskými úřady a dokážeme celou situaci vyřešit rychle a diskrétně.
      - question: Kolik dostanu za panelový byt 2+1 v Ostrově?
        answer: Panelové byty v Ostrově se prodávají za 12 000–18 000 Kč/m². Byt 2+1 (55 m²) tedy vyjde na cca 700 000–1 000 000 Kč. Při výkupu nabízíme odpovídající cenu.
      - question: Ovlivní pokles turistického ruchu cenu mé nemovitosti?
        answer: U lázeňských nemovitostí ano — pokles ruské klientely a změny v turistice snížily ceny o 15–25 % oproti roku 2019. U rezidenčních bytů mimo lázeňské centrum je dopad menší.
      - question: Vykupujete nemovitosti i na německé hranici?
        answer: Ano, působíme v celém kraji včetně Chebska a Ašska. Nemovitosti u hranic oceňujeme s přihlédnutím k přeshraniční poptávce.
