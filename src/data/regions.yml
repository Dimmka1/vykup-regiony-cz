      - question: Jaké ceny nabízíte za byty v Liberci?
        answer: Výkupní ceny bytů v Liberci v Libereckém kraji se odvíjejí od aktuálního trhu, kde se ceny pohybují kolem 45 000 Kč/m². Nabízíme obvykle 85–90 % tržní hodnoty.
