name: PPC Performance Gate

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

concurrency:
  group: ppc-perf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ppc-lighthouse:
    name: PPC Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI for PPC pages
        run: npx --yes @lhci/cli autorun --config=lighthouserc-ppc.js
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
